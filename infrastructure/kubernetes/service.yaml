apiVersion: v1
kind: Service
metadata:
  name: soc-analyst-agent
  namespace: soc-analyst
  labels:
    app.kubernetes.io/name: soc-analyst-agent
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: soc-platform
  annotations:
    service.kubernetes.io/topology-mode: Auto
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: soc-analyst-agent
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  sessionAffinity: None
