apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soc-analyst-agent.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soc-analyst-agent.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
