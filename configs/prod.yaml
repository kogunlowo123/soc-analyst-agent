# ===========================================================================
# SOC Analyst Agent -- Production environment configuration
# ===========================================================================
# All integrations are live.  Structured JSON logging at WARN level.
# Multi-AZ database.  Per-org configurable token budgets.

environment: production

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
app:
  name: soc-analyst-agent
  host: 0.0.0.0
  port: 8000
  debug: false
  workers: 4

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: WARN
  format: json              # structured JSON shipped to log aggregator
  include_caller: false
  structlog_processors:
    - structlog.processors.JSONRenderer
  sentry:
    enabled: true
    dsn: "${SENTRY_DSN}"
    traces_sample_rate: 0.05

# ---------------------------------------------------------------------------
# Database (Multi-AZ PostgreSQL)
# ---------------------------------------------------------------------------
database:
  url: "${DATABASE_URL}"
  pool_size: 20
  max_overflow: 20
  echo: false
  ssl_mode: verify-full
  ssl_ca: "${DB_SSL_CA_PATH}"

# ---------------------------------------------------------------------------
# Redis (cluster mode)
# ---------------------------------------------------------------------------
redis:
  url: "${REDIS_URL}"
  cluster_mode: true

# ---------------------------------------------------------------------------
# LLM Layer
# ---------------------------------------------------------------------------
llm:
  provider: openai
  model: gpt-4o
  temperature: 0.1
  max_tokens: 4096
  embedding_model: text-embedding-3-large
  embedding_dimensions: 3072
  token_budget:
    daily_limit: "${TOKEN_BUDGET_DAILY}"   # per-org, injected at deploy
    per_request_limit: 8192
    alert_threshold_pct: 80                # alert at 80 % usage

# ---------------------------------------------------------------------------
# Vector Store
# ---------------------------------------------------------------------------
vector_store:
  type: opensearch
  url: "${OPENSEARCH_URL}"
  index: soc_analyst_prod_vectors
  username: "${OPENSEARCH_USER}"
  password: "${OPENSEARCH_PASSWORD}"
  replicas: 2
  shards: 3

# ---------------------------------------------------------------------------
# SIEM
# ---------------------------------------------------------------------------
siem:
  splunk:
    base_url: "${SPLUNK_BASE_URL}"
    verify_ssl: true
    mock: false
    timeout_seconds: 120
  elastic:
    base_url: "${ELASTIC_BASE_URL}"
    mock: false
    timeout_seconds: 60
  sentinel:
    workspace_id: "${SENTINEL_WORKSPACE_ID}"
    mock: false
    timeout_seconds: 120

# ---------------------------------------------------------------------------
# Threat Intelligence (full integration)
# ---------------------------------------------------------------------------
threat_intel:
  mock: false
  virustotal:
    enabled: true
    tier: premium            # 500 req/min
  abuseipdb:
    enabled: true
  shodan:
    enabled: true
  urlscan:
    enabled: true
  misp:
    base_url: "${MISP_BASE_URL}"
    enabled: true
  cache:
    ip_ttl_seconds: 86400     # 24 h
    domain_ttl_seconds: 3600  # 1 h
    hash_ttl_seconds: 86400
    url_ttl_seconds: 3600

# ---------------------------------------------------------------------------
# Incident Management
# ---------------------------------------------------------------------------
incident_management:
  store: database
  crowdstrike:
    base_url: "${CROWDSTRIKE_BASE_URL}"
    mock: false
  ad_integration:
    mock: false
    graph_base_url: "https://graph.microsoft.com/v1.0"

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
notifications:
  slack:
    enabled: true
    channel: "#soc-prod-alerts"
  teams:
    enabled: true
  email:
    enabled: true
    provider: sendgrid
  pagerduty:
    enabled: true

# ---------------------------------------------------------------------------
# Internal APIs
# ---------------------------------------------------------------------------
internal_apis:
  cmdb:
    base_url: "${CMDB_BASE_URL}"
    mock: false
  netbox:
    base_url: "${NETMGMT_BASE_URL}"
    mock: false
  vulnerability_scanner:
    type: "${VULN_SCANNER_TYPE}"   # tenable or qualys
    mock: false

# ---------------------------------------------------------------------------
# Data Ingestion
# ---------------------------------------------------------------------------
ingestion:
  chunk_size: 512
  chunk_overlap: 64
  sources:
    - type: mitre_attack
      schedule: "0 3 1 * *"    # 1st of month at 03:00 UTC
    - type: nvd
      days_back: 1             # daily delta
      severity: LOW
      schedule: "0 4 * * *"    # daily at 04:00 UTC
    - type: confluence
      spaces:
        - SOC
        - IR
        - SECOPS
        - THREATINTEL
      schedule: "0 2 * * *"    # daily at 02:00 UTC
    - type: sharepoint
      site_ids: []
      schedule: "0 1 * * 0"   # weekly on Sunday at 01:00 UTC

# ---------------------------------------------------------------------------
# Rate Limits
# ---------------------------------------------------------------------------
rate_limits:
  api_requests_per_minute: 500
  tool_executions_per_minute: 200
  per_user_requests_per_minute: 30

# ---------------------------------------------------------------------------
# Auth
# ---------------------------------------------------------------------------
auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_algorithm: HS256
  jwt_expiration_hours: 8     # shorter sessions in prod

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  tracing:
    enabled: true
    sample_rate: 0.05          # 5 % sampling in prod
  metrics:
    enabled: true
    push_interval_seconds: 15
  otel_endpoint: "${OTEL_ENDPOINT}"
  health_check:
    interval_seconds: 30
    dependencies:
      - name: database
        critical: true
      - name: redis
        critical: true
      - name: opensearch
        critical: true
      - name: llm_api
        critical: false
